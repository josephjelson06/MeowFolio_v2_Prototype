<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resumeai &mdash; Resumes</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/resumes.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/modal.css">
</head>
<body data-workspace-page="resumes">

<main class="res-page-body res-page">
  <section class="res-page-header">
    <div class="res-header-badges">
      <span class="badge-accent">RESUME LIBRARY</span>
      <span class="badge-info" id="resume-count">0 RESUMES</span>
    </div>
    <div class="res-page-title">All your resumes</div>
    <div class="res-page-desc">Paginated resume versions with rename, download, and delete actions. The grid stays at 3 cards per row, with up to 6 visible tiles per page.</div>
  </section>

  <section class="res-cards-grid" id="resume-grid" aria-label="Resume library"></section>

  <div class="list-pagination">
    <div class="page-status" id="resume-page">Page 1 of 1</div>
    <div class="page-controls">
      <button class="r-action" id="resume-prev" type="button">Previous</button>
      <button class="r-action" id="resume-next" type="button">Next</button>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
<script src="js/modal.js"></script>
<script src="js/resumes.js"></script>
</body>
</html>
