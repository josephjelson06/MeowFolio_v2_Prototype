<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resumeai &mdash; Profile</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/globals.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body data-workspace-page="profile">

<main class="profile-body profile-page">
  <section class="profile-section profile-hero">
    <div class="profile-avatar-big">AK</div>
    <div class="profile-identity">
      <div class="profile-badges">
        <span class="badge-accent">FREE PLAN</span>
        <span class="badge-info">MEMBER SINCE JAN 2026</span>
      </div>
      <div class="profile-name">Arjun Kumar</div>
      <div class="profile-email">arjun@email.com</div>
    </div>
    <a class="btn-new profile-logout" href="index.html">Logout</a>
  </section>

  <section class="profile-section">
    <div class="profile-section-title">Usage details</div>
    <div class="usage-row"><span>ATS analyses</span><span class="profile-usage-value">8 / 50</span></div>
    <div class="usage-track"><div class="usage-fill" style="width:16%"></div></div>
    <div class="usage-row profile-usage-row"><span>JD comparisons</span><span class="profile-usage-value">3 / 20</span></div>
    <div class="usage-track"><div class="usage-fill" style="width:15%"></div></div>
    <div class="usage-row profile-usage-row"><span>PDF exports</span><span class="profile-usage-value">2 / 100</span></div>
    <div class="usage-track"><div class="usage-fill" style="width:2%"></div></div>
    <div class="usage-row profile-usage-row"><span>Parses today</span><span class="profile-usage-value">3 / 3</span></div>
    <div class="usage-track"><div class="usage-fill" style="width:100%"></div></div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
